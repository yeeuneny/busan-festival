<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>부산 축제 탐색</title>

  <!-- Pretendard -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/pretendard/dist/web/static/pretendard.css"
  />

  <!-- Font Awesome -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
  />

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    :root {
      --panel-radius: 14px;
      --muted: #f8fafc;
      --panel-border: #e6e9ee;
      --title-color: #0f1724;
      --text-muted: #64748b;
      --accent: #0ea5e9;
    }

    /* =========================
       기본 레이아웃
    ========================= */
    html,
    body {
      height: 100%;
      margin: 0;
      color: var(--title-color);
      background: var(--muted);
      font-family:
        Pretendard,
        system-ui,
        -apple-system,
        "Segoe UI",
        Roboto,
        "Helvetica Neue",
        Arial,
        sans-serif;
    }

    .app-layout {
      display: flex;
      min-height: 100vh;
      flex-direction: column;
    }

    .split {
      display: flex;
      width: 100%;
      flex: 1 1 auto;
      gap: 0;
    }

    /* =========================
       좌측 지도 영역
    ========================= */
    .map-area {
      display: flex;
      box-sizing: border-box;
      flex-basis: 62%;
      flex-direction: column;
      gap: 16px;
      padding: 28px;
      background: #fff;
    }

    .map-header h1 {
      margin: 0;
      color: var(--title-color);
      font-size: 20px;
      font-weight: 700;
    }

    .map-header p {
      margin: 6px 0 0;
      color: var(--text-muted);
      font-size: 13px;
    }

    .hint-box {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      color: var(--text-muted);
      border: 1px solid var(--panel-border);
      border-radius: 12px;
      background: #fff;
      box-shadow: 0 6px 18px rgba(2, 6, 23, 0.04);
      font-size: 13px;
    }

    #map-container {
      position: relative;
      display: flex;
      box-sizing: border-box;
      align-items: center;
      justify-content: center;
      padding: 18px;
      border-radius: 8px;
      background: #fff;
    }

    #map-coordinate-wrapper {
      position: relative;
      display: inline-block;
      box-sizing: border-box;
      width: 100%;
      max-width: 960px;
    }

    #map-coordinate-wrapper img {
      display: block;
      width: 100%;
      height: auto;
      margin: 0;
      padding: 0;
    }

    #marker-layer {
      position: absolute;
      z-index: 2;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    /* =========================
       지도 마커
    ========================= */
    .region-marker {
      position: absolute;
      width: 32px;
      height: 32px;
      padding: 0;
      border: 0;
      outline: none;
      background: transparent;
      cursor: pointer;
      pointer-events: auto;
      transform: translate(-50%, -50%);
    }

    .region-marker::before {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 10px;
      height: 10px;
      content: "";
      border: 1.5px solid rgba(6, 21, 40, 0.08);
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 6px 14px rgba(2, 6, 23, 0.1);
      transform: translate(-50%, -50%) scale(1);
      transition:
        transform 0.18s ease,
        background 0.18s ease,
        box-shadow 0.18s ease;
    }

    .region-marker:hover::before {
      background: rgba(14, 165, 233, 0.95);
      box-shadow:
        0 0 0 8px rgba(14, 165, 233, 0.14),
        0 8px 18px rgba(2, 6, 23, 0.14);
      transform: translate(-50%, -50%) scale(1.35);
    }

    .region-marker.selected::before {
      background: rgba(3, 105, 161, 0.95);
      box-shadow:
        0 0 0 8px rgba(3, 105, 161, 0.18),
        0 10px 22px rgba(2, 6, 23, 0.16);
      transform: translate(-50%, -50%) scale(1.45);
    }

    .region-marker::after {
      position: absolute;
      z-index: 20;
      top: -8px;
      left: 50%;
      padding: 6px 8px;
      color: #fff;
      content: attr(data-region);
      border-radius: 8px;
      background: rgba(2, 6, 23, 0.88);
      font-size: 12px;
      opacity: 0;
      white-space: nowrap;
      transform: translate(-50%, -100%) scale(0);
      transform-origin: bottom center;
      transition:
        transform 0.12s ease,
        opacity 0.12s ease;
    }

    .region-marker:hover::after,
    .region-marker.selected::after {
      opacity: 1;
      transform: translate(-50%, -100%) scale(1);
    }

    /* =========================
       우측 패널
    ========================= */
    .panel-area {
      display: flex;
      box-sizing: border-box;
      flex-basis: 38%;
      flex-direction: column;
      padding: 20px;
      border-left: 1px solid rgba(15, 23, 42, 0.06);
      box-shadow: -8px 0 24px rgba(2, 6, 23, 0.04);
    }

    .panel-header {
      position: sticky;
      z-index: 5;
      top: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(15, 23, 42, 0.04);
      background: transparent;
    }

    .panel-body {
      height: calc(100vh - 140px);
      margin-top: 12px;
      padding-right: 6px;
      overflow: auto;
    }

    .empty-card {
      display: flex;
      box-sizing: border-box;
      width: 100%;
      height: 100%;
      min-height: 240px;
      align-items: center;
      justify-content: center;
      padding: 22px;
      border: 1px solid var(--panel-border);
      border-radius: 12px;
      background: #fff;
      box-shadow: 0 8px 20px rgba(2, 6, 23, 0.04);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      color: var(--title-color);
      border: 1px solid rgba(15, 23, 42, 0.06);
      border-radius: 999px;
      background: #fff;
      font-size: 13px;
      font-weight: 700;
    }

    /* =========================
       축제 카드
    ========================= */
    .festival-card > .card-inner {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 12px;
      padding: 12px;
      border: 1px solid rgba(15, 23, 42, 0.04);
      border-radius: 12px;
      background: #fff;
      box-shadow: 0 6px 18px rgba(2, 6, 23, 0.04);
      transition:
        transform 0.12s ease,
        box-shadow 0.12s ease;
    }

    .festival-card > .card-inner:hover {
      box-shadow: 0 12px 26px rgba(2, 6, 23, 0.06);
      transform: translateY(-4px);
    }

    .festival-card img {
      width: 120px;
      height: 80px;
      flex-shrink: 0;
      border-radius: 8px;
      object-fit: cover;
    }

    .festival-card .card-info {
      flex: 1 1 auto;
    }

    .festival-card .card-info h5 {
      max-height: 2.6em;
      margin: 0 0 6px;
      overflow: hidden;
      color: var(--title-color);
      font-size: 16px;
      line-height: 1.2;
    }

    .festival-card .card-info .addr,
    .festival-card .card-info .tel {
      max-height: 3em;
      margin-bottom: 6px;
      overflow: hidden;
      color: var(--text-muted);
      font-size: 13px;
    }

    .festival-type-badge {
      display: inline-block;
      margin-top: 8px;
      padding: 4px 8px;
      border: 1px solid rgba(15, 23, 42, 0.06);
      border-radius: 999px;
      background: #fff;
      font-size: 12px;
      font-weight: 700;
    }

    .festival-image-placeholder {
      display: flex;
      width: 120px;
      height: 80px;
      flex-shrink: 0;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      border-radius: 8px;
      background: #f1f5f9;
      font-size: 20px;
    }

    /* =========================
       반응형
    ========================= */
    @media (max-width: 1023px) {
      .split {
        flex-direction: column;
      }

      .map-area,
      .panel-area {
        width: 100%;
        flex-basis: auto;
        padding: 16px;
      }

      .panel-body {
        height: auto;
        overflow: visible;
      }

      #map-container {
        padding: 12px;
        border-radius: 10px;
      }

      #map-coordinate-wrapper {
        max-width: 100%;
      }

      .festival-card > .card-inner {
        align-items: stretch;
        flex-direction: column;
      }

      .festival-card img,
      .festival-image-placeholder {
        width: 100%;
        height: 180px;
      }
    }
  </style>
</head>

<body>
  <div class="app-layout">
    <div class="split">
      <!-- =========================
           좌측 지도 영역
      ========================== -->
      <aside class="map-area">
        <div class="map-header">
          <h1>부산 축제 지도</h1>
          <p>지도를 클릭하면 지역별 축제 정보를 확인할 수 있어요</p>
        </div>

        <div class="hint-box" aria-hidden="true">
          <i class="fa-solid fa-circle-info" style="color: #0f1724;"></i>
          <span>원하는 지역을 클릭해보세요</span>
        </div>

        <section id="map-container" aria-label="부산 지도">
          <div id="map-coordinate-wrapper">
            <img src="busan-map.png" alt="부산 16개 구·군 지도" />
            <div id="marker-layer" aria-hidden="false"></div>
          </div>
        </section>

        <div
          style="
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 8px;
            color: var(--text-muted);
            font-size: 13px;
          "
        >
          <i
            class="fa-solid fa-location-dot"
            style="color: var(--text-muted); font-size: 12px;"
          ></i>
          <small>TIP. 마우스를 올리면 지역명을 확인할 수 있어요</small>
        </div>
      </aside>

      <!-- =========================
           우측 축제 정보 패널
      ========================== -->
      <aside
        class="panel-area"
        role="region"
        aria-label="축제 정보 패널"
      >
        <div class="panel-header">
          <div style="display: flex; flex-direction: column;">
            <strong style="font-size: 16px;">축제 정보</strong>
            <span style="color: var(--text-muted); font-size: 12px;">
              선택된 지역의 축제 정보를 확인하세요
            </span>
          </div>

          <div id="total-badge" class="badge">전체 축제 -</div>
        </div>

        <div id="panel-body" class="panel-body">
          <!-- 로딩 상태 -->
          <div id="loading-state" class="empty-card" style="display: none;">
            <div style="text-align: center;">
              <div
                style="
                  margin-bottom: 8px;
                  color: var(--text-muted);
                  font-size: 20px;
                "
              >
                <i class="fa-solid fa-spinner fa-spin"></i>
              </div>

              <h3
                style="
                  margin: 0 0 8px;
                  color: var(--title-color);
                "
              >
                축제 데이터를 불러오는 중입니다.
              </h3>

              <p style="margin: 0; color: var(--text-muted);">
                잠시만 기다려주세요.
              </p>
            </div>
          </div>

          <!-- 오류 상태 -->
          <div id="error-state" class="empty-card" style="display: none;">
            <div style="text-align: center;">
              <div
                style="
                  margin-bottom: 8px;
                  color: var(--text-muted);
                  font-size: 20px;
                "
              >
                <i class="fa-solid fa-triangle-exclamation"></i>
              </div>

              <h3
                id="error-title"
                style="
                  margin: 0 0 8px;
                  color: var(--title-color);
                "
              >
                데이터를 불러오지 못했습니다
              </h3>

              <p
                id="error-desc"
                style="margin: 0; color: var(--text-muted);"
              >
                파일 경로와 Live Server 실행 여부를 확인해주세요.
              </p>
            </div>
          </div>

          <!-- 초기 빈 상태 -->
          <div id="empty-state" class="empty-card" aria-live="polite">
            <div style="text-align: center;">
              <div
                style="
                  margin-bottom: 8px;
                  color: var(--text-muted);
                  font-size: 28px;
                "
              >
                <i class="fa-regular fa-calendar"></i>
              </div>

              <h3
                style="
                  margin: 0 0 8px;
                  color: var(--title-color);
                "
              >
                지역을 선택해주세요
              </h3>

              <p style="margin: 0; color: var(--text-muted);">
                지도를 클릭하면 해당 지역의 축제 목록이 표시됩니다.
              </p>
            </div>
          </div>

          <!-- 선택된 지역 -->
          <div id="region-selected" style="display: none; margin-top: 6px;">
            <div
              style="
                padding: 12px 0;
                border-bottom: 1px solid rgba(15, 23, 42, 0.04);
              "
            >
              <h4
                id="region-title"
                style="
                  margin: 0;
                  color: var(--title-color);
                  font-size: 18px;
                "
              ></h4>

              <p
                id="region-sub"
                style="
                  margin: 4px 0 0;
                  color: var(--text-muted);
                  font-size: 13px;
                "
              >
                선택한 지역의 축제 정보를 확인하세요
              </p>
            </div>

            <div id="region-list" style="margin-top: 12px;"></div>
          </div>
        </div>
      </aside>
    </div>
  </div>

  <script>
    /* ============================================
       지역별 마커 좌표
       regionCoords 값은 변경하지 않음
    ============================================ */
    const regionCoords = [
      { name: "강서구", left: 22.8, top: 64.9 },
      { name: "금정구", left: 57.6, top: 33.7 },
      { name: "기장군", left: 77.7, top: 25.8 },
      { name: "남구", left: 59.4, top: 65.2 },
      { name: "동구", left: 50.6, top: 64.4 },
      { name: "동래구", left: 56.3, top: 44.5 },
      { name: "부산진구", left: 49.9, top: 56.0 },
      { name: "북구", left: 45.8, top: 41.4 },
      { name: "사상구", left: 39.6, top: 57.2 },
      { name: "사하구", left: 38.9, top: 74.8 },
      { name: "서구", left: 44.6, top: 66.7 },
      { name: "수영구", left: 62, top: 55.1 },
      { name: "연제구", left: 56.6, top: 49.9 },
      { name: "영도구", left: 53.9, top: 75.6 },
      { name: "중구", left: 48.1, top: 69.3 },
      { name: "해운대구", left: 69.2, top: 49.8 }
    ];

    /* ============================================
       DOM 참조
    ============================================ */
    const wrapper = document.getElementById("map-coordinate-wrapper");
    const mapImage = wrapper.querySelector("img");
    const markerLayer = document.getElementById("marker-layer");

    const panelBody = document.getElementById("panel-body");
    const loadingState = document.getElementById("loading-state");
    const errorState = document.getElementById("error-state");
    const emptyState = document.getElementById("empty-state");
    const regionSelected = document.getElementById("region-selected");
    const regionTitle = document.getElementById("region-title");
    const regionSub = document.getElementById("region-sub");
    const regionList = document.getElementById("region-list");
    const totalBadge = document.getElementById("total-badge");

    const errorTitle = document.getElementById("error-title");
    const errorDesc = document.getElementById("error-desc");

    /* ============================================
       상태
    ============================================ */
    let selectedRegion = null;

    let festivalDataset = null;
    let festivalItems = [];
    let isDataLoaded = false;
    let dataLoadError = null;

    /* ============================================
       지도 마커
    ============================================ */
    function createMarker(region) {
      const button = document.createElement("button");

      button.type = "button";
      button.className = "region-marker";
      button.dataset.region = region.name;
      button.setAttribute("aria-label", `${region.name} 선택`);
      button.style.left = `${region.left}%`;
      button.style.top = `${region.top}%`;

      button.addEventListener("click", (event) => {
        event.stopPropagation();
        handleMarkerClick(region.name, button);
      });

      button.addEventListener("mouseenter", () => {
        if (!selectedRegion) {
          updatePanel(region.name, true);
        }
      });

      button.addEventListener("mouseleave", () => {
        if (!selectedRegion) {
          resetPanel();
        }
      });

      button.addEventListener("keydown", (event) => {
        if (event.key === "Enter" || event.key === " ") {
          event.preventDefault();
          button.click();
        }
      });

      return button;
    }

    function renderMarkers() {
      markerLayer.innerHTML = "";

      regionCoords.forEach((region) => {
        markerLayer.appendChild(createMarker(region));
      });
    }

    function clearSelection() {
      selectedRegion = null;

      document
        .querySelectorAll(".region-marker.selected")
        .forEach((button) => button.classList.remove("selected"));

      resetPanel();
    }

    function handleMarkerClick(regionName, button) {
      if (selectedRegion === regionName) {
        clearSelection();
        return;
      }

      document
        .querySelectorAll(".region-marker.selected")
        .forEach((marker) => marker.classList.remove("selected"));

      button.classList.add("selected");
      selectedRegion = regionName;

      updatePanel(regionName, false);

      const isDesktop = window.matchMedia("(min-width: 1024px)").matches;

      if (isDesktop) {
        panelBody.scrollTop = 0;
      } else {
        regionSelected.scrollIntoView({
          behavior: "smooth",
          block: "start"
        });
      }
    }

    /* ============================================
       패널 공통 상태
    ============================================ */
    function hideAllPanelStates() {
      loadingState.style.display = "none";
      errorState.style.display = "none";
      emptyState.style.display = "none";
      regionSelected.style.display = "none";
    }

    function getTotalFestivalCount() {
      if (
        festivalDataset &&
        typeof festivalDataset.total === "number" &&
        festivalDataset.total > 0
      ) {
        return festivalDataset.total;
      }

      return festivalItems.length;
    }

    function updateTotalBadge() {
      totalBadge.textContent = isDataLoaded
        ? `전체 축제 ${getTotalFestivalCount()}`
        : "전체 축제 -";
    }

    function renderLoadingState() {
      hideAllPanelStates();
      loadingState.style.display = "";
      totalBadge.textContent = "전체 축제 -";
    }

    function renderErrorState(message) {
      hideAllPanelStates();
      errorState.style.display = "";
      totalBadge.textContent = "전체 축제 -";

      errorTitle.textContent = "데이터를 불러오지 못했습니다";
      errorDesc.textContent =
        message ||
        "파일 경로와 Live Server 실행 여부를 확인해주세요.";

      console.error("Festival load error:", message);
    }

    function renderInitialEmptyState() {
      hideAllPanelStates();
      emptyState.style.display = "";
    }

    function showSelectedRegion(regionName) {
      hideAllPanelStates();
      regionSelected.style.display = "block";

      regionTitle.textContent = `${regionName} 축제`;
      regionSub.textContent = "선택한 지역의 축제 정보를 확인하세요";
      regionList.innerHTML = "";
    }

    /* ============================================
       JSON 데이터 로딩
    ============================================ */
    async function loadFestivalData() {
        renderLoadingState();
        try {
            const res = await fetch('./data/부산_축제공연행사.json');
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.json();
            if (!data || !Array.isArray(data.items)) throw new Error('items 배열이 없습니다');
            festivalDataset = data;
            festivalItems = data.items;
            isDataLoaded = true;
            dataLoadError = null;

            const total = (typeof data.total === 'number' && data.total > 0) ? data.total : festivalItems.length;
            if (totalBadge) totalBadge.textContent = `전체 축제 ${total}`;

            console.log('Festival data loaded. items:', festivalItems.length);
            renderInitialEmptyState();
        } catch (err) {
            dataLoadError = err;
            isDataLoaded = false;
            renderErrorState(err.message || String(err));
        }
    }


    /* ============================================
       지역별 축제 필터링
    ============================================ */
    function getFestivalsByRegion(regionName) {
      if (!isDataLoaded) {
        return [];
      }

      return festivalItems.filter((item) => {
        return item?.addr1?.includes(regionName);
      });
    }

    /* ============================================
       축제 카드
    ============================================ */
    function createImageElement(item) {
      const imageSource = item.firstimage || item.firstimage2;

      if (!imageSource) {
        const placeholder = document.createElement("div");
        placeholder.className = "festival-image-placeholder";
        placeholder.setAttribute("aria-label", "대표 이미지 없음");
        placeholder.innerHTML = '<i class="fa-regular fa-image"></i>';
        return placeholder;
      }

      const image = document.createElement("img");

      image.src = imageSource;
      image.alt = item.title
        ? `${item.title} 대표 이미지`
        : "축제 대표 이미지";
      image.loading = "lazy";

      image.addEventListener("error", () => {
        const placeholder = document.createElement("div");

        placeholder.className = "festival-image-placeholder";
        placeholder.setAttribute("aria-label", "대표 이미지 없음");
        placeholder.innerHTML = '<i class="fa-regular fa-image"></i>';

        image.replaceWith(placeholder);
      });

      return image;
    }

    function createFestivalCard(item) {
      const card = document.createElement("article");
      const cardInner = document.createElement("div");
      const cardInfo = document.createElement("div");
      const title = document.createElement("h5");
      const address = document.createElement("div");
      const typeBadge = document.createElement("div");

      card.className = "festival-card";
      cardInner.className = "card-inner";
      cardInfo.className = "card-info";
      address.className = "addr";
      typeBadge.className = "festival-type-badge";

      title.textContent = item.title || "제목 없음";

      address.textContent = [item.addr1, item.addr2]
        .filter(Boolean)
        .join(" ");

      typeBadge.textContent = "축제·행사";

      cardInner.appendChild(createImageElement(item));

      cardInfo.appendChild(title);
      cardInfo.appendChild(address);

      if (item.tel) {
        const telephone = document.createElement("div");

        telephone.className = "tel";
        telephone.textContent = `전화: ${item.tel}`;

        cardInfo.appendChild(telephone);
      }

      cardInfo.appendChild(typeBadge);
      cardInner.appendChild(cardInfo);
      card.appendChild(cardInner);

      if (item.contentid) {
        card.dataset.contentId = item.contentid;
      }

      if (item.mapx) {
        card.dataset.mapx = item.mapx;
      }

      if (item.mapy) {
        card.dataset.mapy = item.mapy;
      }

      return card;
    }

    function renderFestivalList(items, regionName) {
      regionList.innerHTML = "";

      if (!items.length) {
        renderNoDataState(regionName);
        return;
      }

      const fragment = document.createDocumentFragment();

      items.forEach((item) => {
        fragment.appendChild(createFestivalCard(item));
      });

      regionList.appendChild(fragment);
    }

    function renderNoDataState(regionName) {
      const noDataCard = document.createElement("div");

      noDataCard.className = "empty-card";
      noDataCard.innerHTML = `
        <div style="text-align: center;">
          <div
            style="
              margin-bottom: 8px;
              color: var(--text-muted);
              font-size: 28px;
            "
          >
            <i class="fa-regular fa-folder-open"></i>
          </div>

          <h3
            style="
              margin: 0 0 8px;
              color: var(--title-color);
            "
          >
            ${regionName} 축제
          </h3>

          <p style="margin: 0; color: var(--text-muted);">
            현재 이 지역에 등록된 축제·행사 데이터가 없습니다.
          </p>
        </div>
      `;

      regionList.replaceChildren(noDataCard);
    }

    /* ============================================
       패널 업데이트
    ============================================ */
    function updatePanel(regionName, isHover = false) {
      if (dataLoadError) {
        renderErrorState(
          dataLoadError.message || String(dataLoadError)
        );
        return;
      }

      if (!isDataLoaded) {
        renderLoadingState();
        return;
      }

      const festivals = getFestivalsByRegion(regionName);

      if (isHover) {
        /*
         * 선택된 지역이 없을 때만 초기 안내 문구를
         * 지역별 축제 개수로 잠시 변경한다.
         */
        if (!selectedRegion) {
          emptyState.querySelector("h3").textContent =
            `${regionName} 축제 ${festivals.length}개`;
          emptyState.querySelector("p").textContent =
            "클릭하면 해당 지역의 축제 목록을 확인할 수 있습니다.";
        }

        return;
      }

      showSelectedRegion(regionName);
      renderFestivalList(festivals, regionName);
      updateTotalBadge();
    }

    function resetPanel() {
      if (dataLoadError) {
        renderErrorState(
          dataLoadError.message || String(dataLoadError)
        );
        return;
      }

      if (!isDataLoaded) {
        renderLoadingState();
        return;
      }

      renderInitialEmptyState();

      emptyState.querySelector("h3").textContent =
        "지역을 선택해주세요";
      emptyState.querySelector("p").textContent =
        "지도를 클릭하면 해당 지역의 축제 목록이 표시됩니다.";

      updateTotalBadge();
    }

    /* ============================================
       초기화
    ============================================ */
    function init() {
      if (mapImage.complete) {
        renderMarkers();
      } else {
        mapImage.addEventListener("load", renderMarkers, {
          once: true
        });
      }

      loadFestivalData();
    }

    init();
  </script>
</body>
</html>
