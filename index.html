<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>부산 축제 탐색</title>

  <!-- Pretendard (전체 폰트) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pretendard/dist/web/static/pretendard.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    /* =========================
       폰트 및 공통 스타일
       ========================= */
    :root {
      --panel-radius: 14px;
      --muted: #F8FAFC;
      --panel-border: #E6E9EE;
      --title-color: #0f1724;
      --text-muted: #64748b;
      --accent: #0ea5e9;
    }

    html, body {
      height: 100%;
      font-family: Pretendard, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
      background: var(--muted);
      margin: 0;
      color: var(--title-color);
    }

    .app-layout { min-height: 100vh; display:flex; flex-direction:column; }

    /* 좌우 분할 레이아웃 (기본) */
    .split { display:flex; width:100%; gap:0; flex:1 1 auto; }
    .map-area { flex-basis:62%; padding:28px; background:#fff; box-sizing:border-box; display:flex; flex-direction:column; gap:16px; }
    .panel-area { flex-basis:38%; padding:20px; box-sizing:border-box; border-left:1px solid rgba(15,23,42,0.06); box-shadow:-8px 0 24px rgba(2,6,23,0.04); display:flex; flex-direction:column; }

    /* map header */
    .map-header h1 { margin:0; font-size:20px; font-weight:700; color:var(--title-color); }
    .map-header p { margin:6px 0 0; color:var(--text-muted); font-size:13px; }

    .hint-box { display:inline-flex; gap:10px; align-items:center; background:#fff; border:1px solid var(--panel-border); padding:8px 12px; border-radius:12px; box-shadow:0 6px 18px rgba(2,6,23,0.04); color:var(--text-muted); font-size:13px; }

    /* =========================
       바깥 지도 레이아웃 컨테이너
       (padding / 중앙 정렬 등 레이아웃 담당)
       ========================= */
    #map-container {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center; /* 내부 래퍼를 중앙에 정렬 */
      padding: 18px; /* 지도 주변 여백 — 래퍼 바깥 */
      box-sizing: border-box;
      background: #ffffff;
      border-radius: 8px;
    }

    /* =========================
       실제 좌표 기준 래퍼 (이미지 크기와 정확히 동일)
       - 이 내부에서 이미지의 표시 크기가 결정되며,
       - #marker-layer는 이 래퍼를 기준으로 inset:0 으로 배치됩니다.
       ========================= */
    #map-coordinate-wrapper {
      position: relative; /* marker-layer 기준 */
      display: inline-block; /* 이미지를 기준으로 크기 결정 */
      width: 100%;
      max-width: 960px; /* 이미지 max-width 기준 (이전 값 유지) */
      box-sizing: border-box;
    }

    /* =========================
       지도 이미지
       ========================= */
    #map-coordinate-wrapper img {
      display: block;
      width: 100%;
      height: auto;
      margin: 0;
      padding: 0;
      /* object-fit not required; avoid transforms/margins */
    }

    /* =========================
       마커 레이어
       - 반드시 래퍼 내부, inset:0
       ========================= */
    #map-coordinate-wrapper #marker-layer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 2;
      pointer-events: none; /* 개별 마커에서 pointer-events:auto 설정 */
    }

    /* =========================
       지도 마커 (기존 규칙 유지 + 클릭영역 확보)
       ========================= */
    .region-marker {
      position: absolute;
      width: 32px;
      height: 32px;
      padding: 0;
      border: 0;
      background: transparent;
      transform: translate(-50%, -50%);
      cursor: pointer;
      outline: none;
      pointer-events: auto; /* 부모에 pointer-events:none 인 경우에도 작동하도록 auto */
    }

    .region-marker::before {
      content: "";
      position: absolute;
      left:50%; top:50%;
      transform: translate(-50%, -50%) scale(1);
      width:10px; height:10px; border-radius:50%;
      background:#ffffff;
      border:1.5px solid rgba(6,21,40,0.08);
      box-shadow:0 6px 14px rgba(2,6,23,0.10);
      transition: transform .18s ease, background .18s ease, box-shadow .18s ease;
    }

    .region-marker:hover::before {
      transform: translate(-50%, -50%) scale(1.35);
      background: rgba(14,165,233,0.95);
      box-shadow: 0 0 0 8px rgba(14,165,233,0.14), 0 8px 18px rgba(2,6,23,0.14);
    }

    .region-marker.selected::before {
      transform: translate(-50%, -50%) scale(1.45);
      background: rgba(3,105,161,0.95);
      box-shadow: 0 0 0 8px rgba(3,105,161,0.18), 0 10px 22px rgba(2,6,23,0.16);
    }

    .region-marker::after {
      content: attr(data-region);
      position: absolute;
      left:50%;
      top:-8px;
      transform: translate(-50%,-100%) scale(0);
      transform-origin: bottom center;
      padding:6px 8px; border-radius:8px;
      background: rgba(2,6,23,0.88); color:#fff; font-size:12px; white-space:nowrap;
      opacity:0; transition: transform .12s ease, opacity .12s ease; z-index:20;
    }
    .region-marker:hover::after, .region-marker.selected::after {
      transform: translate(-50%,-100%) scale(1); opacity:1;
    }

    /* 우측 패널 */
    .panel-header { display:flex; align-items:center; justify-content:space-between; gap:12px; padding-bottom:12px; border-bottom:1px solid rgba(15,23,42,0.04); position:sticky; top:0; background:transparent; z-index:5; }
    .panel-body { margin-top:12px; overflow:auto; padding-right:6px; height: calc(100vh - 140px); }

    .empty-card { width:100%; height:100%; min-height:240px; display:flex; align-items:center; justify-content:center; background:#fff; border:1px solid var(--panel-border); border-radius:12px; box-shadow:0 8px 20px rgba(2,6,23,0.04); padding:22px; box-sizing:border-box; }
    .badge { display:inline-flex; align-items:center; gap:8px; padding:6px 10px; border-radius:999px; background:#fff; border:1px solid rgba(15,23,42,0.06); font-weight:700; font-size:13px; color:var(--title-color); }

    @media (max-width:1023px) {
      .split { flex-direction:column; }
      .map-area, .panel-area { flex-basis:auto; width:100%; padding:16px; }
      .panel-body { height:auto; overflow:visible; }
      #map-container { padding:12px; border-radius:10px; }
      #map-coordinate-wrapper { max-width: 100%; }
    }
  </style>
</head>
<body>
  <div class="app-layout">
    <div class="split">
      <!-- 좌측 지도 영역 -->
      <aside class="map-area">
        <div class="map-header">
          <h1>부산 축제 지도</h1>
          <p>지도를 클릭하면 지역별 축제 정보를 확인할 수 있어요</p>
        </div>

        <div class="hint-box" aria-hidden="true">
          <i class="fa-solid fa-circle-info" style="color:#0F1724;"></i>
          <span>원하는 지역을 클릭해보세요</span>
        </div>

        <!-- =========================
             바깥 지도 레이아웃 컨테이너
             (패딩과 중앙정렬 담당)
             ========================= -->
        <section id="map-container" aria-label="부산 지도">
          <!-- =========================
               실제 좌표 기준 래퍼
               (이미지 크기와 정확히 동일한 크기를 가짐)
               ========================= -->
          <div id="map-coordinate-wrapper">
            <!-- 지도 이미지 -->
            <img src="busan-map.png" alt="부산 16개 구·군 지도" />

            <!-- 마커 레이어 (래퍼를 기준으로 inset:0) -->
            <div id="marker-layer" aria-hidden="false"></div>
          </div>
        </section>

        <div style="display:flex; gap:8px; align-items:center; color:var(--text-muted); font-size:13px; margin-top:8px;">
          <i class="fa-solid fa-location-dot" style="color:var(--text-muted); font-size:12px;"></i>
          <small>TIP. 마우스를 올리면 지역명을 확인할 수 있어요</small>
        </div>
      </aside>

      <!-- 우측 축제 정보 패널 -->
      <aside class="panel-area" role="region" aria-label="축제 정보 패널">
        <div class="panel-header">
          <div style="display:flex; flex-direction:column;">
            <strong style="font-size:16px;">축제 정보</strong>
            <span style="font-size:12px; color:var(--text-muted);">선택된 지역의 축제 정보를 확인하세요</span>
          </div>
          <div class="badge">전체 축제</div>
        </div>

        <div id="panel-body" class="panel-body">
          <div id="empty-state" class="empty-card" aria-live="polite">
            <div style="text-align:center;">
              <div style="font-size:28px; color:var(--text-muted); margin-bottom:8px;">
                <i class="fa-regular fa-calendar"></i>
              </div>
              <h3 style="margin:0 0 8px; color:var(--title-color);">지역을 선택해주세요</h3>
              <p style="margin:0; color:var(--text-muted);">지도를 클릭하면 해당 지역의 축제 목록이 표시됩니다.</p>
            </div>
          </div>

          <div id="region-selected" style="display:none; margin-top:6px;">
            <div style="padding:12px 0; border-bottom:1px solid rgba(15,23,42,0.04);">
              <h4 id="region-title" style="margin:0; font-size:18px; color:var(--title-color);"></h4>
              <p id="region-sub" style="margin:4px 0 0; color:var(--text-muted); font-size:13px;">선택한 지역의 축제 정보를 확인하세요</p>
            </div>
            <div id="region-list" style="margin-top:12px;"></div>
          </div>
        </div>
      </aside>
    </div>
  </div>

  <!-- =========================
       지도 마커와 패널 관리 스크립트
       (regionCoords는 절대 변경하지 마세요)
       ========================= -->
  <script>
    const regionCoords = [
        { name: '강서구', left: 22.8, top: 64.9 },
        { name: '금정구', left: 57.6, top: 33.7 },
        { name: '기장군', left: 77.7, top: 25.8 },
        { name: '남구', left: 59.4, top: 65.2 },
        { name: '동구', left: 50.6, top: 64.4 },
        { name: '동래구', left: 56.3, top: 44.5 },
        { name: '부산진구', left: 49.9, top: 56.0 },
        { name: '북구', left: 45.8, top: 41.4 },
        { name: '사상구', left: 39.6, top: 57.2 },
        { name: '사하구', left: 38.9, top: 74.8 },
        { name: '서구', left: 44.6, top: 66.7 },
        { name: '수영구', left: 62, top: 55.1 },
        { name: '연제구', left: 56.6, top: 49.9 },
        { name: '영도구', left: 53.9, top: 75.6 },
        { name: '중구', left: 48.1, top: 69.3 },
        { name: '해운대구', left: 69.2, top: 49.8 }
    ];

    /* DOM references (marker-layer is inside map-coordinate-wrapper) */
    const wrapper = document.getElementById('map-coordinate-wrapper');
    const mapImage = wrapper.querySelector('img');
    const markerLayer = document.getElementById('marker-layer');

    const panelBody = document.getElementById('panel-body');
    const emptyState = document.getElementById('empty-state');
    const regionSelected = document.getElementById('region-selected');
    const regionTitle = document.getElementById('region-title');
    const regionSub = document.getElementById('region-sub');
    const regionList = document.getElementById('region-list');

    let selectedRegion = null;

    /* createMarker / renderMarkers / handlers unchanged logically */
    function createMarker(region) {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'region-marker';
      btn.dataset.region = region.name;
      btn.setAttribute('aria-label', `${region.name} 선택`);
      btn.style.left = `${region.left}%`;
      btn.style.top = `${region.top}%`;

      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        handleMarkerClick(region.name, btn);
      });

      btn.addEventListener('mouseenter', () => {
        if (!selectedRegion && typeof updatePanel === 'function') {
          updatePanel(region.name, true);
        } else if (!selectedRegion) {
          showHoverPreview(region.name);
        }
      });

      btn.addEventListener('mouseleave', () => {
        if (!selectedRegion && typeof resetPanel === 'function') {
          resetPanel();
        } else if (!selectedRegion) {
          hideHoverPreview();
        }
      });

      btn.addEventListener('keydown', (ev) => {
        if (ev.key === 'Enter' || ev.key === ' ') {
          ev.preventDefault();
          btn.click();
        }
      });

      return btn;
    }

    function renderMarkers() {
      // ensure markerLayer is empty then append markers
      markerLayer.innerHTML = '';
      regionCoords.forEach(r => {
        const m = createMarker(r);
        markerLayer.appendChild(m);
      });
    }

    function clearSelection() {
      selectedRegion = null;
      document.querySelectorAll('.region-marker.selected').forEach(b => b.classList.remove('selected'));
      resetPanel();
    }

    function handleMarkerClick(regionName, button) {
      if (selectedRegion === regionName) {
        clearSelection();
        return;
      }

      document.querySelectorAll('.region-marker.selected').forEach(b => b.classList.remove('selected'));
      button.classList.add('selected');
      selectedRegion = regionName;

      if (typeof updatePanel === 'function') {
        updatePanel(regionName, false);
      } else {
        showSelectedRegion(regionName);
      }

      const desktop = window.matchMedia('(min-width:1024px)').matches;
      if (desktop) {
        if (panelBody) panelBody.scrollTop = 0;
      } else {
        regionSelected?.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    }

    function showHoverPreview(regionName) {
      regionSub.textContent = `${regionName} 지역 정보를 미리보기`;
    }

    function hideHoverPreview() {
      regionSub.textContent = '선택한 지역의 축제 정보를 확인하세요';
    }

    function showSelectedRegion(regionName) {
      emptyState.style.display = 'none';
      regionSelected.style.display = 'block';
      regionTitle.textContent = `${regionName} 축제`;
      regionSub.textContent = '선택한 지역의 축제 정보를 확인하세요';
      regionList.innerHTML = '';
    }

    /* 기본 resetPanel/updatePanel 정의 (기존 전역 함수 없을 경우에만) */
    if (typeof resetPanel !== 'function') {
      window.resetPanel = function() {
        emptyState.style.display = '';
        regionSelected.style.display = 'none';
        regionTitle.textContent = '';
        regionSub.textContent = '선택한 지역의 축제 정보를 확인하세요';
        regionList.innerHTML = '';
      };
    }

    if (typeof updatePanel !== 'function') {
      window.updatePanel = function(regionName, isHover) {
        if (isHover) {
          regionSub.textContent = `${regionName} 지역 정보를 미리보기`;
        } else {
          showSelectedRegion(regionName);
        }
      };
    }

    /* 초기화: 이미지 로드 후 마커 렌더 (이미지 로드 대기만 추가) */
    function init() {
      if (mapImage.complete) {
        renderMarkers();
      } else {
        mapImage.addEventListener('load', renderMarkers);
      }
      resetPanel();
    }

    init();
  </script>
</body>
</html>
